schema: nenjo.package.v1
name: "agenticauto"
version: "0.2.0"
description: Autonomous auto repair shop operating system built on Nenjo.
dependencies:
  "@nenjo-ai/connectors": "^1.1.0"
  "@nenjo-ai/capabilities": "^1.0.0"
  "@nenjo-ai/context": "^1.1.0"
arguments:
  - name: shop_name
    selector: args.shop.name
    scope: org
    type: json
    required: true
    description: Shop display name as a JSON string.
    sample: '"Agentic Auto"'
  - name: shop_phone
    selector: args.shop.phone
    scope: org
    type: json
    required: true
    description: Shop phone number as a JSON string.
    sample: '"+1 (555) 010-1234"'
  - name: shop_hours
    selector: args.shop.hours
    scope: org
    type: json
    required: true
    description: Shop operating hours as a JSON string or object.
    sample: '{"monday":"8:00 AM - 6:00 PM","tuesday":"8:00 AM - 6:00 PM","wednesday":"8:00 AM - 6:00 PM","thursday":"8:00 AM - 6:00 PM","friday":"8:00 AM - 6:00 PM","saturday":"By appointment","sunday":"Closed"}'
modules:
  - agents/shop-manager-agent.yaml
  - agents/sms-agent.yaml
  - agents/bay-agent.yaml
  - agents/parts-agent.yaml
  - agents/card-agent.yaml
  - agents/marketing-agent.yaml
  - agents/inspection-agent.yaml
  - abilities/inspection_analysis.yaml
  - routines/inspection-to-estimate.yaml
  - routines/marketing-harness.yaml
